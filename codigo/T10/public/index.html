<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T10 - Chat Socket.IO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    h1 { margin-bottom: 20px; }
    #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    .message { padding: 5px 0; border-bottom: 1px solid #eee; }
    .message .user { font-weight: bold; color: #333; }
    .message .time { font-size: 0.8em; color: #999; }
    .system { color: #666; font-style: italic; }
    #form { display: flex; gap: 10px; }
    #input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    #status { margin-bottom: 10px; padding: 5px; border-radius: 4px; }
    .connected { background: #d4edda; color: #155724; }
    .disconnected { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>Chat en Tiempo Real</h1>

  <div id="status" class="disconnected">Desconectado</div>

  <div id="messages"></div>

  <form id="form">
    <input id="input" placeholder="Escribe un mensaje..." autocomplete="off" />
    <button type="submit">Enviar</button>
  </form>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const status = document.getElementById('status');

    // Estado de conexión
    socket.on('connect', () => {
      status.textContent = 'Conectado';
      status.className = 'connected';
      addMessage('Sistema', 'Conectado al servidor', true);
    });

    socket.on('disconnect', () => {
      status.textContent = 'Desconectado';
      status.className = 'disconnected';
      addMessage('Sistema', 'Desconectado del servidor', true);
    });

    // Recibir mensajes
    socket.on('chat:message', (data) => {
      addMessage(data.user, data.text);
    });

    // Usuario escribiendo
    socket.on('chat:typing', (data) => {
      if (data.isTyping) {
        status.textContent = `${data.user} está escribiendo...`;
      } else {
        status.textContent = 'Conectado';
      }
    });

    // Anuncios del sistema
    socket.on('system:announcement', (data) => {
      addMessage('📢 ' + data.from, data.message, true);
    });

    // Enviar mensaje
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (input.value.trim()) {
        socket.emit('chat:send', { text: input.value }, (response) => {
          if (response.success) {
            addMessage('Tú', input.value);
            input.value = '';
          }
        });
      }
    });

    // Notificar que está escribiendo
    let typingTimeout;
    input.addEventListener('input', () => {
      socket.emit('chat:typing', { isTyping: true });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('chat:typing', { isTyping: false });
      }, 1000);
    });

    function addMessage(user, text, isSystem = false) {
      const div = document.createElement('div');
      div.className = isSystem ? 'message system' : 'message';
      const time = new Date().toLocaleTimeString();
      div.innerHTML = `<span class="user">${user}</span> <span class="time">${time}</span><br>${text}`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
